name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Lint and validate
  lint:
    runs-on: ubuntu-latest
    name: Lint & Validate
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort
          pip install -r requirements.txt
      
      - name: Format check with black
        run: black --check . || true
      
      - name: Import sort check with isort
        run: isort --check-only . || true
      
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Syntax check (compile)
        run: |
          python -m py_compile app.py
          python -m py_compile database.py
          python -m py_compile auth.py
          python -m py_compile auth_guard.py
          python -m py_compile crud.py
          python -m py_compile logger.py
          python -m py_compile train.py
          python -m py_compile evaluate.py
          python -m py_compile sweep.py
          python -m py_compile leaderboard.py
          python -m py_compile ci_mlflow_smoke.py

  # Stage 2: Unit & Integration Tests
  test:
    runs-on: ubuntu-latest
    name: Tests & MLflow Smoke Test
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: MLflow smoke test - start server
        run: |
          # Create MLflow directories
          mkdir -p mlruns
          
          # Start MLflow server in background with sqlite backend
          nohup mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlruns \
            --host 127.0.0.1 \
            --port 5000 > mlflow.log 2>&1 &
          echo $! > mlflow.pid
          
          # Wait for server to be available
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:5000 >/dev/null 2>&1; then
              echo "✓ MLflow server is up"
              break
            fi
            echo "Waiting for MLflow... ($i/30)"
            sleep 1
          done
          sleep 1
      
      - name: Run MLflow smoke test
        run: python3 ci_mlflow_smoke.py
      
      - name: MLflow cleanup
        if: always()
        run: |
          # Stop MLflow server
          if [ -f mlflow.pid ]; then
            kill "$(cat mlflow.pid)" || true
            rm -f mlflow.pid
          else
            pkill -f "mlflow server" || true
          fi
          sleep 1
          
          # Show MLflow logs for debugging
          echo "--- MLflow Server Log ---"
          tail -n 100 mlflow.log || echo "(no log available)"

  # Stage 3: Build Docker image
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build Docker image (push only on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 4: Security scan (optional but recommended)
  security:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Summary
  status:
    runs-on: ubuntu-latest
    name: CI Status
    needs: [ lint, test, build ]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ CI Pipeline failed"
            exit 1
          else
            echo "✓ CI Pipeline passed"
          fi
